# LLM settings for context window management

llm:
  provider: "ollama"
  endpoint: "http://spark-1267:11434/v1"
  model: "qwen3.5:35b"
  api_key: "${OLLAMA_API_KEY:-}"
  timeout: 600
  temperature: 0.1
  max_tokens: 32768

chunking:
  # Optional secondary limit. Leave null to chunk by character count only.
  max_sentences_per_chunk: null
  # Leave both limits null to send each article as one whole-document request.
  max_characters_per_chunk: null
  overlap_tokens: 400

# Validation thresholds
# Ontology grounding settings
ontology:
  default_ontologies:
    - "ELMO"
    - "ENVO"
    - "PATO"
    - "CHEBI"
    - "GO"
  required_for:
    - "entity"
    - "attribute"
  suggestion_threshold: 0.7
  ols_endpoint: "https://www.ebi.ac.uk/ols4/api"
  elmo_url: "https://raw.githubusercontent.com/timalamenciak/elmo/2026-07-03/elmo.owl"
  wikidata_endpoint: "https://www.wikidata.org/w/api.php"
  request_timeout: 30

# Output settings
output:
  merge_duplicated_nodes: true
