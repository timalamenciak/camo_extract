# Few-shot examples for causal graph extraction

examples:
  - id: "example_1"
    description: "Experimental predator removal study"
    input_text: |
      We conducted a predator exclusion experiment in grassland plots. After two years, plots without predators showed a 40% increase in native rodent abundance compared to control plots (p<0.01). This demonstrates that predation is a key driver of rodent population dynamics.

    output_graph:
      nodes:
        - id: "node_exp1_intervention"
          entity: "ENVO:0000386"
          entity_label: "predator"
          attribute: ""
          attribute_label: ""
          state_qualifier: "removed"
          entity_type: "management_intervention"
        - id: "node_exp1_outcome"
          entity: "ENVO:0000386"
          entity_label: "prey"
          attribute: "PATO:0000070"
          attribute_label: "abundance"
          state_qualifier: "increased"
          entity_type: "environmental_variable"
      edges:
        - id: "edge_exp1"
          subject_node_id: "node_exp1_intervention"
          object_node_id: "node_exp1_outcome"
          predicate: "enables"
          philosophical_account: "interventionist"
          philosophical_account_family: "difference_making"
          features:
            direction_status: "asserted"
            direction_evidence: "experimental"
            token_or_type: "type"
            determinism: "indeterministic_process"
            proximate_distal: "proximate"
            contributing_sole: "contributing_cause"
            reversibility: "not_addressed"
            strength_qualitative: "strong"
          evidence:
            type: "quasi_experiment"
            object: "both"
            BradfordHill_viewpoints: ["strength", "temporality", "experiment"]
            certainty_grade: "high"
          prov:
            source_text: "After two years, plots without predators showed a 40% increase in native rodent abundance compared to control plots (p<0.01)"
            source_page: 5
            source_line_range: [10, 12]

  - id: "example_2"
    description: "Longitudinal observational study on climate impacts"
    input_text: |
      Over a 10-year monitoring period in temperate forests, we observed that warmer spring temperatures preceded earlier leaf-out dates across all 12 species studied (r = 0.78, p<0.001). This suggests climate warming is shifting phenological timing.

    output_graph:
      nodes:
        - id: "node_clim1"
          entity: "ENVO:00000142"
          entity_label: "temperature"
          attribute: "PATO:0000107"
          attribute_label: "temperature"
          state_qualifier: "unchanged"
          entity_type: "environmental_variable"
        - id: "node_bio1"
          entity: "BFO:0000015"
          entity_label: "leaf emergence"
          attribute: "PATO:0000072"
          attribute_label: "timing"
          state_qualifier: "unchanged"
          entity_type: "environmental_process"
      edges:
