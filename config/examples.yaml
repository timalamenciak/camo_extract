  - id: "example_3"
    description: "Correlational study with multiple factors"
    input_text: |
      Soil nitrogen concentration was positively correlated with invasive plant cover (r = 0.62, p=0.02), while native species diversity showed a negative correlation with both nitrogen (r = -0.55, p=0.04) and invasive cover (r = -0.48, p=0.06). These patterns suggest that nitrogen enrichment may facilitate invasion at the expense of native diversity.

    output_graph:
      nodes:
        - id: "node_nitrogen"
          entity: "ENVO:00002006"
          entity_label: "soil nitrogen"
          attribute: "PATO:0000072"
