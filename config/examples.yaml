          philosophical_account_family: "difference_making"
          features:
            direction_status: "asserted"
            direction_evidence: "temporal_precedence"
            token_or_type: "type"
            determinism: "indeterministic_process"
            proximate_distal: "distal"
            contributing_sole: "contributing_cause"
            reversibility: "not_addressed"
            strength_qualitative: "strong"
          evidence:
