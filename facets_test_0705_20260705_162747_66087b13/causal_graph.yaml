- id: causal_mosaic:node:485aabb593be
  name: one-time use of glyphosate
  entity_type: management_intervention
  entity_term: causal_mosaic:unresolved_29f10d17cc
  state_or_change_qualifier: occurred
  source_spans:
  - text: In 1998, we quantified the impact and duration of one-time use of glyphosate,
      hand-pulling, inflorescence clipping, and mulch on the seedbank and shoots of
      three exotic species, native herbaceous species, and (for shoots, non-adult)
      native species of shrubs and trees.
- id: causal_mosaic:node:0f02ccc3a3cf
  name: hand-pulling
  entity_type: management_intervention
  entity_term: causal_mosaic:unresolved_face378a38
  state_or_change_qualifier: occurred
  source_spans:
  - text: In 1998, we quantified the impact and duration of one-time use of glyphosate,
      hand-pulling, inflorescence clipping, and mulch on the seedbank and shoots of
      three exotic species, native herbaceous species, and (for shoots, non-adult)
      native species of shrubs and trees.
- id: causal_mosaic:node:2ec41d2eb1e1
  name: repeated management plus ecological restoration
  entity_type: management_intervention
  entity_term: causal_mosaic:unresolved_cc4bee8494
  state_or_change_qualifier: occurred
  source_spans:
  - text: The repeated management plus ecological restoration was more successful
      in all cases, with similar results by 2006, while one-time application of glyphosate
      and hand-pulling worsened problems.
- id: causal_mosaic:node:21383f445818
  name: inflorescence clipping
  entity_type: management_intervention
  entity_term: causal_mosaic:unresolved_b69a67ebdb
  state_or_change_qualifier: occurred
  source_spans:
  - text: As expected, inflorescence clipping and mulching were ineffective as one-time
      treatments but did not worsen the exotic species problem or decrease native
      species' densities.
