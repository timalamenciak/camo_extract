- id: causal_mosaic:node:243c955a05c1
  name: lake re-acidification
  entity_type: environmental_process
  entity_term: causal_mosaic:unresolved_0bc2db0677
  state_or_change_qualifier: occurred
  source_spans:
  - text: Drought can lead to oxidation of stored S in lake catchments. When wet conditions
      resume, the release of this stored acidity can lead to lake re-acidification
      and many related physical and chemical changes including metal mobilization,
      changes in thermal structure, and increased UV-B penetration (Yan, Keller, Scully,
      Lean, & Dillon, 1996a).
