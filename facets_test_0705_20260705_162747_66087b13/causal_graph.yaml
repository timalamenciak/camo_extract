  original_sentence: Macrofaunal communities at Carrie Bay’s reference stations were
    dominated by mollusks with significantly fewer annelids and very few crustaceans.
    This community did not respond to organic enrichment in the classic way described
    by Pearson and Rosenberg [Oceanogr. Mar. Boil. Annu. Rev. 16 (1978) 229], which
    has accurately predicted the macrobenthic response at many intensive aquaculture
    facilities. None of the eight opportunistic taxa frequently found proliferating
    in enriched sediments near B.C. salmon farms were a large component of the Carrie
    Bay macrobenthos at any place or at any time. Rather, a single annelid ( Nephtys
    cornuta ) was found in moderate abundance and several bivalve mollusks that dominated
    local reference communities have slowly recruited into the remediating sediments.
