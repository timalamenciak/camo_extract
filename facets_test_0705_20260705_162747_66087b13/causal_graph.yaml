- id: causal_mosaic:node:c840baf01a2e
  name: Macrofaunal communities
  entity_type: environmental_variable
  entity_term: causal_mosaic:unresolved_a345282e10
  state_or_change_qualifier: increased
  measured_attribute: abundance
  source_spans:
  - text: Macrofaunal communities at Carrie Bay’s reference stations were dominated
      by mollusks with significantly fewer annelids and very few crustaceans. This
      community did not respond to organic enrichment in the classic way described
      by Pearson and Rosenberg [Oceanogr. Mar. Boil. Annu. Rev. 16 (1978) 229], which
      has accurately predicted the macrobenthic response at many intensive aquaculture
      facilities. None of the eight opportunistic taxa frequently found proliferating
      in enriched sediments near B.C. salmon farms were a large component of the Carrie
      Bay macrobenthos at any place or at any time. Rather, a single annelid ( Nephtys
      cornuta ) was found in moderate abundance and several bivalve mollusks that
      dominated local reference communities have slowly recruited into the remediating
      sediments.
