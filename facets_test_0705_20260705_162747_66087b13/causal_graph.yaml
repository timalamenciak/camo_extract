  entity_term: causal_mosaic:unresolved_825f022dd5
  state_or_change_qualifier: occurred
  source_spans:
  - text: Practices such as thinning followed by prescribed burning, often termed
      'ecosystem restoration practices', are being used in Rocky Mountain forests
      to prevent uncontrolled wildfire and restore forests to pre-settlement conditions.
- id: causal_mosaic:node:a2e17687c56f
