- id: causal_mosaic:node:7c47af9ca5ed
  name: hybrid single-tree and group-selection cutting treatments
  entity_type: management_intervention
  entity_term: causal_mosaic:unresolved_70e7177c24
  state_or_change_qualifier: occurred
  source_spans:
  - text: 'The experimental design compared four cutting treatments: an uncut control
      (26 m2·ha−1 of merchantable basal area [BA], with mean natural canopy gap areas
      of ≤ 100 m2 each) and three hybrid single-tree and group-selection cuttings
      corresponding to a light cut (20% removal; residual BA [RBA]: 21 m2·ha−1; mean
      harvest gap area: 220 m2), a moderate cut (31% removal; RBA: 18 m2·ha−1; gap
      area: 270 m2), and a heavy cut (42% removal; RBA: 15 m2·ha−1; gap area: 340
      m2).'
